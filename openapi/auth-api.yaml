openapi: 3.0.3
info:
  title: Auth API
  version: 1.0.0
paths:
  /api/v1/profile:
    get:
      summary: Get authenticated user profile
      responses:
        '200':
          description: User detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
  /api/v1/profile/roles:
    get:
      summary: Get authenticated user profile with roles
      responses:
        '200':
          description: User with roles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWithRoles'
  /api/v1/profile/groups:
    get:
      summary: Get authenticated user profile with groups
      responses:
        '200':
          description: User with groups
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWithGroups'
  /api/v1/role/count:
    get:
      summary: Count roles
      responses:
        '200':
          description: Role count
          content:
            application/json:
              schema:
                type: integer
                minimum: 0
  /api/v1/role/ids:
    get:
      summary: List role ids
      responses:
        '200':
          description: Role ids
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /api/v1/role/inherited:
    get:
      summary: List inherited roles
      responses:
        '200':
          description: Inherited roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Role'
  /api/v1/role/{role}:
    get:
      summary: Get role details
      parameters:
        - name: role
          in: path
          required: true
          schema:
            type: string
            pattern: '^(?!count$|ids$|inherited$)[A-Za-z][A-Za-z0-9_-]*$'
      responses:
        '200':
          description: Role details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
        '400':
          description: Invalid role value
components:
  schemas:
    Role:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        description:
          type: string
      additionalProperties: true
    UserBase:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
      additionalProperties: true
    UserProfile:
      allOf:
        - $ref: '#/components/schemas/UserBase'
        - type: object
          required:
            - email
          properties:
            email:
              type: string
              format: email
              nullable: false
            firstName:
              type: string
            lastName:
              type: string
            displayName:
              type: string
    UserWithRoles:
      allOf:
        - $ref: '#/components/schemas/UserBase'
        - type: object
          properties:
            roles:
              type: array
              items:
                $ref: '#/components/schemas/Role'
    UserWithGroups:
      allOf:
        - $ref: '#/components/schemas/UserBase'
        - type: object
          properties:
            groups:
              type: array
              items:
                type: string
    UserDetail:
      allOf:
        - $ref: '#/components/schemas/UserProfile'
        - $ref: '#/components/schemas/UserWithRoles'
        - $ref: '#/components/schemas/UserWithGroups'
