openapi: 3.0.3
info:
  title: Auth API
  version: 1.1.0
  description: |
    ## API key versioning decision

    The `api_key` surface currently has no functional v2 divergence in this repository.
    As a result, v2 is treated as premature and **not published**.

    ### Migration note

    - Continue using `/api/v1/api_key/*` as the canonical contract.
    - Any consumer that prepared `/api/v2/api_key/*` URLs should roll back to v1 routes.
    - A v2 route family should only be introduced when there is an explicit breaking change
      (payload schema, status codes, security model, or pagination semantics).
paths:
  /api/v1/profile:
    get:
      summary: Get authenticated user profile
      responses:
        '200':
          description: User detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
              examples:
                default:
                  value:
                    id: usr_123
                    username: jdoe
                    email: john.doe@example.com
                    firstName: John
                    lastName: Doe
                    displayName: John Doe
                    roles:
                      - id: admin
                        label: Administrator
                    groups:
                      - platform-admin
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /api/v1/profile/roles:
    get:
      summary: Get authenticated user profile with roles
      responses:
        '200':
          description: User with roles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWithRoles'
              examples:
                default:
                  value:
                    id: usr_123
                    username: jdoe
                    roles:
                      - id: admin
                        label: Administrator
                        description: Full access
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /api/v1/profile/groups:
    get:
      summary: Get authenticated user profile with groups
      responses:
        '200':
          description: User with groups
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWithGroups'
              examples:
                default:
                  value:
                    id: usr_123
                    username: jdoe
                    groups:
                      - platform-admin
                      - support
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /api/v1/role/count:
    get:
      summary: Count roles
      responses:
        '200':
          description: Role count
          content:
            application/json:
              schema:
                type: integer
                minimum: 0
              examples:
                default:
                  value: 7
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /api/v1/role/ids:
    get:
      summary: List role ids
      responses:
        '200':
          description: Role ids
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
              examples:
                default:
                  value:
                    - admin
                    - manager
                    - viewer
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /api/v1/role/inherited:
    get:
      summary: List inherited roles
      responses:
        '200':
          description: Inherited roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Role'
              examples:
                default:
                  value:
                    - id: support
                      label: Support Agent
                      description: Support operations
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /api/v1/role/{role}:
    get:
      summary: Get role details
      parameters:
        - name: role
          in: path
          required: true
          schema:
            type: string
            pattern: '^(?!count$|ids$|inherited$)[A-Za-z][A-Za-z0-9_-]*$'
      responses:
        '200':
          description: Role details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
              examples:
                default:
                  value:
                    id: admin
                    label: Administrator
                    description: Full access to back-office features
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/v1/notifications:
    get:
      summary: List current user notifications
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Notification list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
              examples:
                default:
                  value:
                    data:
                      - id: notif_1
                        title: Session expiring soon
                        message: Your session expires in 5 minutes.
                        type: warning
                        read: false
                        createdAt: '2026-01-12T10:30:00Z'
                    meta:
                      page: 1
                      pageSize: 20
                      totalItems: 1
                      totalPages: 1
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /api/v1/companies/{id}/members:
    get:
      summary: List members of a company
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Company members list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyMemberListResponse'
              examples:
                default:
                  value:
                    data:
                      - userId: usr_123
                        email: john.doe@example.com
                        firstName: John
                        lastName: Doe
                        role: owner
                        status: active
                      - userId: usr_456
                        email: jane.smith@example.com
                        firstName: Jane
                        lastName: Smith
                        role: member
                        status: invited
                    meta:
                      page: 1
                      pageSize: 20
                      totalItems: 2
                      totalPages: 1
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/v1/auth/social/connect:
    post:
      summary: Connect a social account to current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SocialConnectRequest'
            examples:
              google:
                value:
                  provider: google
                  authorizationCode: 4/0Adeu5BVz...
                  redirectUri: https://app.example.com/auth/social/callback
      responses:
        '200':
          description: Social account connected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SocialConnectResponse'
              examples:
                success:
                  value:
                    success: true
                    provider: google
                    accountId: social_789
                    connectedAt: '2026-01-12T10:35:00Z'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/BusinessError'

components:
  parameters:
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    UnauthorizedError:
      description: Authentication is required or token is invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              value:
                code: AUTH_UNAUTHORIZED
                message: Authentication required.
    ForbiddenError:
      description: Authenticated but not allowed to access this resource.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              value:
                code: AUTH_FORBIDDEN
                message: You are not allowed to access this resource.
    ValidationError:
      description: Invalid payload or parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              value:
                code: VALIDATION_ERROR
                message: One or more fields are invalid.
                details:
                  - field: role
                    issue: Must match required pattern.
    NotFoundError:
      description: Requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              value:
                code: RESOURCE_NOT_FOUND
                message: Resource not found.
    BusinessError:
      description: Business rule conflict.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              value:
                code: SOCIAL_ACCOUNT_ALREADY_LINKED
                message: This social account is already linked to another user.

  schemas:
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              issue:
                type: string
            additionalProperties: true

    PaginationMeta:
      type: object
      required:
        - page
        - pageSize
        - totalItems
        - totalPages
      properties:
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
        totalItems:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0

    Role:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        description:
          type: string
      additionalProperties: true

    UserBase:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
      additionalProperties: true

    UserProfile:
      allOf:
        - $ref: '#/components/schemas/UserBase'
        - type: object
          required:
            - email
          properties:
            email:
              type: string
              format: email
              nullable: false
            firstName:
              type: string
            lastName:
              type: string
            displayName:
              type: string

    UserWithRoles:
      allOf:
        - $ref: '#/components/schemas/UserBase'
        - type: object
          properties:
            roles:
              type: array
              items:
                $ref: '#/components/schemas/Role'

    UserWithGroups:
      allOf:
        - $ref: '#/components/schemas/UserBase'
        - type: object
          properties:
            groups:
              type: array
              items:
                type: string

    UserDetail:
      allOf:
        - $ref: '#/components/schemas/UserProfile'
        - $ref: '#/components/schemas/UserWithRoles'
        - $ref: '#/components/schemas/UserWithGroups'

    Notification:
      type: object
      required:
        - id
        - title
        - message
        - type
        - read
        - createdAt
      properties:
        id:
          type: string
        title:
          type: string
        message:
          type: string
        type:
          type: string
          enum: [info, success, warning, error]
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time

    NotificationListResponse:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    CompanyMember:
      type: object
      required:
        - userId
        - email
        - role
        - status
      properties:
        userId:
          type: string
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
        status:
          type: string
          enum: [active, invited, suspended]

    CompanyMemberListResponse:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CompanyMember'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    SocialConnectRequest:
      type: object
      required:
        - provider
        - authorizationCode
      properties:
        provider:
          type: string
          enum: [google, github, microsoft]
        authorizationCode:
          type: string
        redirectUri:
          type: string
          format: uri

    SocialConnectResponse:
      type: object
      required:
        - success
        - provider
        - accountId
        - connectedAt
      properties:
        success:
          type: boolean
        provider:
          type: string
        accountId:
          type: string
        connectedAt:
          type: string
          format: date-time
