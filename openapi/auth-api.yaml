openapi: 3.0.3
info:
  title: Auth API
  version: 1.0.0
paths:
  /api/v1/role/count:
    get:
      summary: Count roles
      responses:
        '200':
          description: Role count
  /api/v1/role/ids:
    get:
      summary: List role ids
      responses:
        '200':
          description: Role ids
  /api/v1/role/inherited:
    get:
      summary: List inherited roles
      responses:
        '200':
          description: Inherited roles
  /api/v1/role/{role}:
    get:
      summary: Get role details
      parameters:
        - name: role
          in: path
          required: true
          schema:
            type: string
            pattern: '^(?!count$|ids$|inherited$)[A-Za-z][A-Za-z0-9_-]*$'
      responses:
        '200':
          description: Role details
        '400':
          description: Invalid role value
